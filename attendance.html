<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#050510,#0a0a2a);
  color:white;
}

/* HEADER */
.header{
  background:rgba(0,255,255,0.1);
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  color:#00ffff;
  box-shadow:0 0 15px #00ffff55;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

select, input{
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#111;
  color:white;
  flex:1;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.save-btn{
  background:linear-gradient(90deg,#00ffff,#ff00ff);
  color:white;
}

.back-btn{
  background:#ff004c;
  color:white;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th,td{
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
  text-align:center;
}

th{
  background:rgba(0,255,255,0.2);
  color:#00ffff;
}

.present{
  background:#00c853;
  color:white;
}

.absent{
  background:#d50000;
  color:white;
}

/* STATUS BUTTONS */
.status-btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
📋 ATTENDANCE SYSTEM - RWANDAN FUTURE MIS
</div>

<div class="container">

  <!-- CONTROLS -->
  <div class="controls">

    <select id="classSelect">
      <option value="">Select Class</option>
      <option>P1</option>
      <option>P2</option>
      <option>P3</option>
      <option>P4</option>
      <option>P5</option>
      <option>P6</option>
      <option>S1</option>
      <option>S2</option>
      <option>S3</option>
      <option>S4</option>
      <option>S5</option>
      <option>S6</option>
    </select>

    <input type="date" id="attDate">

    <button class="save-btn" onclick="saveAttendance()">
      💾 Save
    </button>

    <button class="back-btn" onclick="goBack()">
      ⬅ Back
    </button>

  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Student Name</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="studentList">
      <tr>
        <td colspan="3">Select class to load students</td>
      </tr>
    </tbody>
  </table>

</div>

<script>
let students = [];

// demo load (later tuzayihuza na Firebase yawe)
function loadStudents(){
  const cls = document.getElementById("classSelect").value;

  if(!cls){
    document.getElementById("studentList").innerHTML =
      "<tr><td colspan='3'>Select class first</td></tr>";
    return;
  }

  // demo data (uzasimbuza Firebase)
  students = [
    "John Doe",
    "Alice",
    "Emmanuel",
    "Grace",
    "Kevin"
  ];

  let html = "";

  students.forEach((s,i)=>{
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${s}</td>
        <td>
          <button class="status-btn present" onclick="mark(this,'Present')">Present</button>
          <button class="status-btn absent" onclick="mark(this,'Absent')">Absent</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("studentList").innerHTML = html;
}

document.getElementById("classSelect").addEventListener("change", loadStudents);

function mark(btn,status){
  let row = btn.parentElement.parentElement;
  row.setAttribute("data-status",status);

  if(status === "Present"){
    row.style.background = "rgba(0,200,83,0.2)";
  }else{
    row.style.background = "rgba(213,0,0,0.2)";
  }
}

function saveAttendance(){
  alert("Attendance saved successfully ✔ (connect Firebase here)");
}

function goBack(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
