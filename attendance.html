<!DOCTYPE html>
<html>
<head>
<title>Attendance SaaS Pro</title>

<style>
/* FULL SCREEN BACKGROUND */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
}

/* LOGIN CONTAINER */
#loginBox{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #111827);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}

/* ANIMATION BACKGROUND */
@keyframes gradientBG {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* LOGIN CARD */
.loginCard{
  width:320px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:16px;
  text-align:center;
  color:white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
  animation: pop 0.6s ease;
}

/* POP ANIMATION */
@keyframes pop{
  from{transform:scale(0.8); opacity:0}
  to{transform:scale(1); opacity:1}
}

/* TITLE */
.loginCard h2{
  margin:10px 0 5px;
}

/* SUBTITLE */
.subtitle{
  font-size:12px;
  opacity:0.7;
  margin-bottom:20px;
}

/* INPUTS */
.loginCard select,
.loginCard input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background: rgba(255,255,255,0.15);
  color:white;
}

/* PLACEHOLDER */
.loginCard input::placeholder{
  color:#ddd;
}

/* BUTTON */
.loginCard button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg,#0ea5e9,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.loginCard button:hover{
  transform: scale(1.05);
}

/* LOGO */
.logo{
  font-size:40px;
}
</style>
</head>

<body>

<!-- ================= LOGIN UI ================= -->
<div id="loginBox">

  <div class="loginCard">

    <h2>🎓 Teacher Login</h2>

    <select id="subjectLogin">
      <option>MATHEMATICS</option>
      <option>ENGLISH</option>
      <option>SCIENCE</option>
      <option>PHYSICS</option>
      <option>CHEMISTRY</option>
      <option>BIOLOGY</option>
      <option>COMPUTER SCIENCE</option>
    </select>

    <input type="password" id="password" placeholder="Enter password">

    <button onclick="loginTeacher()">Login</button>

  </div>

</div>

<!-- ================= DASHBOARD ================= -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📊 SaaS MIS</h2>
    <p class="small">Attendance System</p>

    <button onclick="loadStudents()">👨‍🎓 Students</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Attendance Dashboard</h1>
    </div>

    <select id="classSelect" onchange="loadStudents()"></select>

    <div id="students"></div>

  </div>

</div>

<script>

/* ================= SUBJECT PASSWORDS ================= */
const subjectPasswords = {
  MATHEMATICS:"mat12",
  ENGLISH:"engl12",
  SCIENCE:"sci12",
  PHYSICS:"phy12",
  CHEMISTRY:"chem12",
  BIOLOGY:"bio12",
  "COMPUTER SCIENCE":"cs12"
};

window.currentSubject = null;

/* ================= LOGIN ================= */
window.loginTeacher = function(){

  const subject = document.getElementById("subjectLogin").value;
  const pass = document.getElementById("password").value;

  if(subjectPasswords[subject] !== pass){
    alert("Wrong password!");
    return;
  }

  window.currentSubject = subject;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
};

/* ================= CLASSES ================= */
window.onload = function(){
  const select = document.getElementById("classSelect");

  const classes = ["P1","P2","P3","P4","P5","P6","S1","S2","S3","S4","S5","S6"];

  classes.forEach(c=>{
    select.innerHTML += `<option>${c}</option>`;
  });
};

/* ================= STUDENTS DEMO ================= */
window.loadStudents = function(){

  const box = document.getElementById("students");
  const cls = document.getElementById("classSelect").value;

  box.innerHTML = "";

  if(!cls) return;

  for(let i=1;i<=5;i++){
    box.innerHTML += `
      <div class="card">
        <div>
          <b>Student ${i}</b><br>
          <span class="small">${cls}</span>
        </div>

        <div>
          <button class="present">Present</button>
          <button class="absent">Absent</button>
        </div>
      </div>
    `;
  }
};

</script>

</body>
</html>
