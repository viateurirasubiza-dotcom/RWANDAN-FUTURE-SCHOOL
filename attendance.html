<!DOCTYPE html>
<html>
<head>
<title>Attendance SaaS Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;

/* SUBJECT PASSWORDS */
const subjectPasswords = {
  MATHEMATICS: "mat12",
  ENGLISH: "engl12",
  SCIENCE: "sci12",
  PHYSICS: "phy12",
  CHEMISTRY: "chem12",
  BIOLOGY: "bio12",
  "COMPUTER SCIENCE": "cs12"
};

window.currentSubject = null;

/* LOGIN */
window.loginTeacher = function () {
  const subject = document.getElementById("subjectLogin").value;
  const pass = document.getElementById("password").value;

  if (subjectPasswords[subject] !== pass) {
    alert("Wrong password!");
    return;
  }

  window.currentSubject = subject;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "flex";
};

/* SIDEBAR */
window.toggleSidebar = function () {
  document.querySelector(".sidebar").classList.toggle("hide");
};

/* CLASSES */
window.loadClasses = function () {
  const select = document.getElementById("classSelect");

  const classes = ["P1","P2","P3","P4","P5","P6","S1","S2","S3","S4","S5","S6"];

  select.innerHTML = `<option value="">Select Class</option>`;
  classes.forEach(c => select.innerHTML += `<option>${c}</option>`);
};

/* LOAD STUDENTS */
window.loadStudents = async function () {
  const cls = document.getElementById("classSelect").value;
  const box = document.getElementById("students");

  box.innerHTML = "";

  const snap = await getDocs(collection(db, "classStudents"));

  snap.forEach(d => {
    const s = d.data();
    if (s.class === cls) {
      box.innerHTML += `
        <div class="card">
          <div>
            <h3>${s.name}</h3>
            <span>${s.class}</span>
          </div>

          <div>
            <button class="present" onclick="mark('${s.name}','Present')">✔</button>
            <button class="absent" onclick="mark('${s.name}','Absent')">✖</button>
          </div>
        </div>
      `;
    }
  });
};

/* MARK */
window.mark = async function (name, status) {

  const cls = document.getElementById("classSelect").value;
  const today = new Date().toISOString().split("T")[0];

  await addDoc(collection(db, "attendance"), {
    name,
    class: cls,
    subject: window.currentSubject,
    status,
    date: today
  });

  alert(name + " marked " + status);
};

</script>

<style>

/* BODY */
body{
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* LOGIN */
#loginBox{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  width:300px;
}

/* APP */
#app{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding:20px;
  transition:0.3s;
}

.sidebar.hide{
  transform: translateX(-100%);
}

/* MAIN */
.main{
  margin-left:260px;
  padding:20px;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* INPUTS */
select,input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
}

/* BUTTON */
button{
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* CARDS */
.card{
  background: rgba(255,255,255,0.06);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.card:hover{
  transform: scale(1.02);
}

/* STATUS BUTTONS */
.present{
  background:#22c55e;
  color:white;
}

.absent{
  background:#ef4444;
  color:white;
}

/* TITLE */
h1{
  font-size:28px;
  color:#38bdf8;
}

</style>
</head>

<body onload="loadClasses()">

<!-- LOGIN -->
<div id="loginBox">
  <div class="login">
    <h2>Teacher Login</h2>

    <select id="subjectLogin">
      <option>MATHEMATICS</option>
      <option>ENGLISH</option>
      <option>SCIENCE</option>
      <option>PHYSICS</option>
      <option>CHEMISTRY</option>
      <option>BIOLOGY</option>
      <option>COMPUTER SCIENCE</option>
    </select>

    <input type="password" id="password" placeholder="Password">

    <button onclick="loginTeacher()" style="background:#38bdf8;color:white;">
      Login
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📊 SaaS MIS</h2>
    <button onclick="toggleSidebar()">☰ Menu</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Attendance Dashboard</h1>
    </div>

    <select id="classSelect" onchange="loadStudents()"></select>

    <div id="students"></div>

  </div>

</div>

</body>
</html>
