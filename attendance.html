<!DOCTYPE html>
<html>
<head>
<title>Attendance SaaS Pro</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* ================= LOGIN ================= */
#loginBox{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginCard{
  width:340px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow:0 10px 50px rgba(0,0,0,0.6);
  text-align:center;
}

.loginCard h2{
  margin-bottom:20px;
  color:#38bdf8;
}

.loginCard select,
.loginCard input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:none;
  outline:none;
}

.loginCard button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.loginCard button:hover{
  background:#0ea5e9;
}

/* ================= APP ================= */
#app{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  padding:20px;
}

.sidebar h2{
  color:#38bdf8;
}

/* MAIN */
.main{
  margin-left:260px;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.06);
  padding:15px;
  border-radius:15px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BUTTONS */
button{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.present{background:#22c55e;color:white}
.absent{background:#ef4444;color:white}

h1{
  color:#38bdf8;
}

.small{
  opacity:0.7;
  font-size:13px;
}

</style>
</head>

<body>

<!-- ================= LOGIN UI ================= -->
<div id="loginBox">

  <div class="loginCard">

    <h2>🎓 Teacher Login</h2>

    <select id="subjectLogin">
      <option>MATHEMATICS</option>
      <option>ENGLISH</option>
      <option>SCIENCE</option>
      <option>PHYSICS</option>
      <option>CHEMISTRY</option>
      <option>BIOLOGY</option>
      <option>COMPUTER SCIENCE</option>
    </select>

    <input type="password" id="password" placeholder="Enter password">

    <button onclick="loginTeacher()">Login</button>

  </div>

</div>

<!-- ================= DASHBOARD ================= -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📊 SaaS MIS</h2>
    <p class="small">Attendance System</p>

    <button onclick="loadStudents()">👨‍🎓 Students</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Attendance Dashboard</h1>
    </div>

    <select id="classSelect" onchange="loadStudents()"></select>

    <div id="students"></div>

  </div>

</div>

<script>

/* ================= SUBJECT PASSWORDS ================= */
const subjectPasswords = {
  MATHEMATICS:"mat12",
  ENGLISH:"engl12",
  SCIENCE:"sci12",
  PHYSICS:"phy12",
  CHEMISTRY:"chem12",
  BIOLOGY:"bio12",
  "COMPUTER SCIENCE":"cs12"
};

window.currentSubject = null;

/* ================= LOGIN ================= */
window.loginTeacher = function(){

  const subject = document.getElementById("subjectLogin").value;
  const pass = document.getElementById("password").value;

  if(subjectPasswords[subject] !== pass){
    alert("Wrong password!");
    return;
  }

  window.currentSubject = subject;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
};

/* ================= CLASSES ================= */
window.onload = function(){
  const select = document.getElementById("classSelect");

  const classes = ["P1","P2","P3","P4","P5","P6","S1","S2","S3","S4","S5","S6"];

  classes.forEach(c=>{
    select.innerHTML += `<option>${c}</option>`;
  });
};

/* ================= STUDENTS DEMO ================= */
window.loadStudents = function(){

  const box = document.getElementById("students");
  const cls = document.getElementById("classSelect").value;

  box.innerHTML = "";

  if(!cls) return;

  for(let i=1;i<=5;i++){
    box.innerHTML += `
      <div class="card">
        <div>
          <b>Student ${i}</b><br>
          <span class="small">${cls}</span>
        </div>

        <div>
          <button class="present">Present</button>
          <button class="absent">Absent</button>
        </div>
      </div>
    `;
  }
};

</script>

</body>
</html>
