<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance System</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  storageBucket: "neomis-77b36.firebasestorage.app",
  messagingSenderId: "836047126207",
  appId: "1:836047126207:web:df890a577383585698100a"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

window.students = [];

/* LOAD STUDENTS FROM YOUR SYSTEM */
window.loadStudents = async function () {

  const cls = document.getElementById("classSelect").value;
  const list = document.getElementById("list");

  if (!cls) return;

  const snap = await getDocs(collection(db, "classStudents"));

  window.students = [];

  snap.forEach(d => {
    let s = d.data();
    if (s.class === cls) {
      window.students.push(s.name);
    }
  });

  renderStudents();
};

/* RENDER UI */
function renderStudents() {

  let html = "";

  window.students.forEach((name, i) => {

    html += `
      <tr>
        <td>${i + 1}</td>
        <td>${name}</td>
        <td>
          <button class="p" onclick="mark('${name}','Present')">✔ Present</button>
          <button class="a" onclick="mark('${name}','Absent')">✖ Absent</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* MARK ATTENDANCE */
window.mark = async function (name, status) {

  const cls = document.getElementById("classSelect").value;
  const date = document.getElementById("date").value;

  if (!cls || !date) {
    alert("Select class and date");
    return;
  }

  await addDoc(collection(db, "attendance"), {
    name,
    class: cls,
    date,
    status,
    timestamp: Date.now()
  });

  alert(name + " marked " + status);
};

/* LOAD SUMMARY */
window.loadSummary = async function () {

  const cls = document.getElementById("classSelect").value;
  const date = document.getElementById("date").value;

  const q = query(
    collection(db, "attendance"),
    where("class", "==", cls),
    where("date", "==", date)
  );

  const snap = await getDocs(q);

  let present = 0;
  let absent = 0;

  snap.forEach(d => {
    if (d.data().status === "Present") present++;
    else absent++;
  });

  const total = present + absent;
  const percent = total ? Math.round((present / total) * 100) : 0;

  document.getElementById("summary").innerHTML = `
    <h3>📊 Attendance Summary</h3>
    <p>Present: ${present}</p>
    <p>Absent: ${absent}</p>
    <p>Attendance Rate: <b>${percent}%</b></p>
  `;
};

</script>

<style>
body{
  font-family:Arial;
  background:#050510;
  color:white;
  margin:0;
}

.header{
  text-align:center;
  padding:15px;
  background:#00ffff22;
  color:#00ffff;
  font-size:20px;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:#111;
  padding:20px;
  border-radius:10px;
}

select,input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
}

table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #444;
  padding:10px;
  text-align:center;
}

th{
  background:#00ffff33;
}

.p{
  background:#00c853;
  color:white;
}

.a{
  background:#d50000;
  color:white;
}

.summary{
  margin-top:20px;
  padding:10px;
  background:#222;
}
</style>

</head>

<body>

<div class="header">
📋 FULL ATTENDANCE SYSTEM (FIREBASE)
</div>

<div class="container">

  <select id="classSelect" onchange="loadStudents()">
    <option value="">Select Class</option>
    <option>P1</option><option>P2</option><option>P3</option>
    <option>P4</option><option>P5</option><option>P6</option>
    <option>S1</option><option>S2</option><option>S3</option>
    <option>S4</option><option>S5</option><option>S6</option>
  </select>

  <input type="date" id="date">

  <button onclick="loadSummary()">📊 View Summary</button>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Student</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="list">
      <tr><td colspan="3">Select class</td></tr>
    </tbody>
  </table>

  <div id="summary" class="summary"></div>

</div>

</body>
</html>
