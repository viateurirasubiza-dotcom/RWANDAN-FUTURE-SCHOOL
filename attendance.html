<!DOCTYPE html>
<html>
<head>
  <title>Attendance SaaS Dashboard</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSy....",
      authDomain: "neomis-77b36.firebaseapp.com",
      projectId: "neomis-77b36"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;

    // ================= LOAD STUDENTS =================
    window.loadStudents = async function () {

      const cls = document.getElementById("classSelect").value;
      const box = document.getElementById("students");

      if (!cls) return;

      box.innerHTML = "";

      const snap = await getDocs(collection(db, "classStudents"));

      snap.forEach(d => {
        const s = d.data();

        if (s.class === cls) {
          box.innerHTML += `
            <div class="card">
              <div>
                <h3>${s.name}</h3>
                <small>${s.class}</small>
              </div>

              <div class="btns">
                <button class="present" onclick="mark('${s.name}','Present')">Present</button>
                <button class="absent" onclick="mark('${s.name}','Absent')">Absent</button>
              </div>
            </div>
          `;
        }
      });

      loadSummary(cls);
    };

    // ================= MARK =================
    window.mark = async function (name, status) {

      const cls = document.getElementById("classSelect").value;
      const today = new Date().toISOString().split("T")[0];

      await addDoc(collection(db, "attendance"), {
        name,
        class: cls,
        status,
        date: today,
        timestamp: Date.now()
      });

      await updateSummary(name, cls);
      loadSummary(cls);

      alert(`${name} → ${status}`);
    };

    // ================= SUMMARY =================
    async function updateSummary(name, cls) {

      const snap = await getDocs(collection(db, "attendance"));

      let present = 0;
      let absent = 0;

      snap.forEach(d => {
        const a = d.data();
        if (a.name === name && a.class === cls) {
          a.status === "Present" ? present++ : absent++;
        }
      });

      const total = present + absent;
      const percentage = total ? Math.round((present / total) * 100) : 0;

      await setDoc(doc(db, "attendanceSummary", name + "_" + cls), {
        name,
        class: cls,
        present,
        absent,
        total,
        percentage
      });
    }

    window.loadSummary = async function (cls) {

      const snap = await getDocs(collection(db, "attendanceSummary"));

      let html = "";

      snap.forEach(d => {
        const s = d.data();

        if (s.class === cls) {
          html += `
            <div class="summaryCard">
              <h3>${s.name}</h3>

              <div class="stats">
                <span>✅ ${s.present}</span>
                <span>❌ ${s.absent}</span>
                <span>📊 ${s.percentage}%</span>
              </div>

              <button onclick="viewProfile('${s.name}','${s.class}')">
                View Profile
              </button>
            </div>
          `;
        }
      });

      document.getElementById("summary").innerHTML = html;
    };

    // ================= PROFILE =================
    window.viewProfile = async function (name, cls) {

      const snap = await getDocs(collection(db, "attendance"));

      let html = `
        <div class="profile">
          <h2>👨‍🎓 ${name}</h2>
          <p>Class: ${cls}</p>
          <hr/>
      `;

      snap.forEach(d => {
        const a = d.data();

        if (a.name === name && a.class === cls) {
          html += `
            <div class="historyRow">
              <span>${a.date}</span>
              <b>${a.status}</b>
            </div>
          `;
        }
      });

      html += `</div>`;

      document.getElementById("students").innerHTML = html;
    };

    // ================= QR =================
    window.openQR = function () {

      const scanner = new Html5Qrcode("qr");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10 },
        async (text) => {

          await mark(text, "Present");
          scanner.stop();

        }
      );
    };

  </script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0a0f1f;
      color:white;
      display:flex;
    }

    /* SIDEBAR */
    .sidebar{
      width:220px;
      background:#111827;
      height:100vh;
      padding:20px;
      position:fixed;
    }

    .sidebar h2{
      color:#00e5ff;
    }

    .menu button{
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      background:#1f2937;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    /* MAIN */
    .main{
      margin-left:240px;
      padding:20px;
      width:100%;
    }

    h1{
      color:#00e5ff;
    }

    select,button{
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
    }

    /* STUDENT CARDS */
    .card{
      background:#111827;
      padding:15px;
      margin:10px;
      border-radius:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border:1px solid #1f2937;
    }

    .btns button{
      margin-left:5px;
    }

    .present{
      background:#16a34a;
      color:white;
    }

    .absent{
      background:#dc2626;
      color:white;
    }

    /* SUMMARY */
    .summaryCard{
      background:#111827;
      padding:15px;
      margin:10px;
      border-radius:12px;
      border-left:4px solid #00e5ff;
    }

    .stats span{
      margin-right:10px;
    }

    /* PROFILE */
    .profile{
      background:#111827;
      padding:20px;
      border-radius:12px;
    }

    .historyRow{
      display:flex;
      justify-content:space-between;
      padding:5px;
      border-bottom:1px solid #222;
    }

    #qr{
      margin-top:20px;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📊 SaaS MIS</h2>

    <div class="menu">
      <button onclick="loadStudents()">👨‍🎓 Students</button>
      <button onclick="openQR()">📷 QR Attendance</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Attendance Dashboard</h1>

    <select id="classSelect" onchange="loadStudents()">
      <option value="">Select Class</option>
      <option>P1</option><option>P2</option><option>P3</option>
      <option>P4</option><option>P5</option><option>P6</option>
      <option>S1</option><option>S2</option><option>S3</option>
    </select>

    <hr/>

    <div id="students"></div>

    <h2>📊 Summary</h2>
    <div id="summary"></div>

    <div id="qr"></div>

  </div>

</body>
</html>
