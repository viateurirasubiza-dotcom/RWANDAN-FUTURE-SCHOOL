<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSy....",
      authDomain: "neomis-77b36.firebaseapp.com",
      projectId: "neomis-77b36"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;

    // LOAD STUDENTS
    window.loadStudents = async function () {

      const cls = document.getElementById("classSelect").value;
      const container = document.getElementById("list");

      container.innerHTML = "";

      const snap = await getDocs(collection(db, "classStudents"));

      snap.forEach(doc => {
        const s = doc.data();

        if (s.class === cls) {

          container.innerHTML += `
            <div class="card">
              <h3>${s.name}</h3>

              <button class="present" onclick="mark('${s.name}','Present')">Present</button>
              <button class="absent" onclick="mark('${s.name}','Absent')">Absent</button>
            </div>
          `;
        }
      });
    };

    // MARK ATTENDANCE
    window.mark = async function (name, status) {

      const cls = document.getElementById("classSelect").value;

      await addDoc(collection(db, "attendance"), {
        name,
        class: cls,
        status,
        date: new Date().toISOString().split("T")[0],
        timestamp: Date.now()
      });

      alert(name + " marked " + status);
    };

    // VIEW HISTORY
    window.viewHistory = async function () {

      const snap = await getDocs(collection(db, "attendance"));

      let html = "<h2>Attendance History</h2>";

      snap.forEach(d => {
        const a = d.data();

        html += `
          <div class="history">
            ${a.date} | ${a.name} | ${a.class} | ${a.status}
          </div>
        `;
      });

      document.getElementById("history").innerHTML = html;
    };

  </script>

  <style>
    body{
      font-family:Arial;
      background:#0a0a1a;
      color:white;
      padding:20px;
    }

    h1{
      color:#00ffff;
    }

    select,button{
      padding:10px;
      margin:5px;
    }

    .card{
      background:#111;
      padding:10px;
      margin:10px;
      border-radius:10px;
      border:1px solid #00ffff;
    }

    .present{
      background:green;
      color:white;
      padding:8px;
      margin:5px;
    }

    .absent{
      background:red;
      color:white;
      padding:8px;
      margin:5px;
    }

    .history{
      background:#222;
      padding:8px;
      margin:5px;
      border-left:3px solid #00ffff;
    }
  </style>
</head>

<body>

<h1>📋 Attendance System</h1>

<select id="classSelect" onchange="loadStudents()">
  <option value="">Select Class</option>
  <option>P1</option>
  <option>P2</option>
  <option>P3</option>
  <option>P4</option>
  <option>P5</option>
  <option>P6</option>
  <option>S1</option>
  <option>S2</option>
</select>

<button onclick="viewHistory()">View Attendance History</button>

<hr>

<div id="list"></div>

<div id="history"></div>

</body>
</html>
