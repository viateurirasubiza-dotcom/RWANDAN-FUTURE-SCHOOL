<!DOCTYPE html>
<html>
<head>
  <title>Attendance SaaS Dashboard</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSy....",
      authDomain: "neomis-77b36.firebaseapp.com",
      projectId: "neomis-77b36"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;

    // ================= SUBJECT PASSWORDS =================
    const subjectPasswords = {
      MATHEMATICS: "mat12",
      ENGLISH: "engl12",
      IKINYARWANDA: "kinyar12",
      SCIENCE: "sci12",
      "SOCIAL STUDIES": "social12",
      FRENCH: "french12",
      "P.E": "pe12",
      "C.A": "ca12",
      PHYSICS: "phy12",
      CHEMISTRY: "chem12",
      BIOLOGY: "bio12",
      GEOGRAPHY: "geo12",
      HISTORY: "hist12",
      ECONOMICS: "eco12",
      ENTREPRENEURSHIP: "ent12",
      "COMPUTER SCIENCE": "cs12",
      LITERATURE: "lit12",
      SWAHILI: "swa12"
    };

    window.currentSubject = null;

    // ================= LOGIN =================
    window.loginTeacher = function () {
      const subject = document.getElementById("subjectLogin").value;
      const pass = document.getElementById("password").value;

      if (!subjectPasswords[subject] || subjectPasswords[subject] !== pass) {
        alert("Wrong subject password!");
        return;
      }

      window.currentSubject = subject;
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("app").style.display = "flex";
    };

    // ================= SIDEBAR TOGGLE =================
    window.toggleSidebar = function () {
      const sidebar = document.getElementById("sidebar");
      sidebar.style.display = sidebar.style.display === "none" ? "block" : "none";
    };

    // ================= LOAD STUDENTS =================
    window.loadStudents = async function () {
      const cls = document.getElementById("classSelect").value;
      const box = document.getElementById("students");

      if (!cls) return;

      box.innerHTML = "";

      const snap = await getDocs(collection(db, "classStudents"));

      snap.forEach(d => {
        const s = d.data();

        if (s.class === cls) {
          box.innerHTML += `
            <div class="card">
              <div>
                <h3>${s.name}</h3>
                <small>${s.class}</small>
              </div>

              <div class="btns">
                <button class="present" onclick="mark('${s.name}','Present')">Present</button>
                <button class="absent" onclick="mark('${s.name}','Absent')">Absent</button>
              </div>
            </div>
          `;
        }
      });

      loadSummary(cls);
    };

    // ================= MARK =================
    window.mark = async function (name, status) {

      const cls = document.getElementById("classSelect").value;
      const today = new Date().toISOString().split("T")[0];

      await addDoc(collection(db, "attendance"), {
        name,
        class: cls,
        subject: window.currentSubject,
        status,
        date: today,
        timestamp: Date.now()
      });

      await updateSummary(name, cls);
      loadSummary(cls);

      alert(`${name} → ${status}`);
    };

    // ================= SUMMARY =================
    async function updateSummary(name, cls) {

      const snap = await getDocs(collection(db, "attendance"));

      let present = 0;
      let absent = 0;

      snap.forEach(d => {
        const a = d.data();
        if (a.name === name && a.class === cls) {
          a.status === "Present" ? present++ : absent++;
        }
      });

      const total = present + absent;
      const percentage = total ? Math.round((present / total) * 100) : 0;

      await setDoc(doc(db, "attendanceSummary", name + "_" + cls), {
        name,
        class: cls,
        present,
        absent,
        total,
        percentage
      });
    }

    window.loadSummary = async function (cls) {

      const snap = await getDocs(collection(db, "attendanceSummary"));

      let html = "";

      snap.forEach(d => {
        const s = d.data();

        if (s.class === cls) {
          html += `
            <div class="summaryCard">
              <h3>${s.name}</h3>

              <div class="stats">
                <span>✅ ${s.present}</span>
                <span>❌ ${s.absent}</span>
                <span>📊 ${s.percentage}%</span>
              </div>

              <button onclick="viewProfile('${s.name}','${s.class}')">
                View Profile
              </button>
            </div>
          `;
        }
      });

      document.getElementById("summary").innerHTML = html;
    };

    // ================= PROFILE =================
    window.viewProfile = async function (name, cls) {

      const snap = await getDocs(collection(db, "attendance"));

      let html = `
        <div class="profile">
          <h2>👨‍🎓 ${name}</h2>
          <p>Class: ${cls}</p>
          <p>Subject: ${window.currentSubject}</p>
          <hr/>
      `;

      snap.forEach(d => {
        const a = d.data();

        if (a.name === name && a.class === cls) {
          html += `
            <div class="historyRow">
              <span>${a.date}</span>
              <b>${a.status}</b>
            </div>
          `;
        }
      });

      html += `</div>`;

      document.getElementById("students").innerHTML = html;
    };

    // ================= CLASSES UP TO S6 =================
    window.loadClasses = function () {
      const select = document.getElementById("classSelect");

      const classes = [
        "P1","P2","P3","P4","P5","P6",
        "S1","S2","S3","S4","S5","S6"
      ];

      select.innerHTML = `<option value="">Select Class</option>`;
      classes.forEach(c => {
        select.innerHTML += `<option>${c}</option>`;
      });
    };

  </script>

<style>
body{margin:0;font-family:Arial;background:#0a0f1f;color:white}

/* LOGIN */
#loginBox{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login{
  background:#111827;
  padding:20px;
  border-radius:12px;
}

/* APP */
#app{display:none}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#111827;
  height:100vh;
  padding:20px;
  position:fixed;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

/* BUTTONS */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.present{background:#16a34a;color:white}
.absent{background:#dc2626;color:white}

.card,.summaryCard{
  background:#111827;
  padding:15px;
  margin:10px;
  border-radius:12px;
}
</style>
</head>

<body onload="loadClasses()">

<!-- LOGIN -->
<div id="loginBox">
  <div class="login">
    <h2>Teacher Login</h2>

    <select id="subjectLogin">
      <option>MATHEMATICS</option>
      <option>ENGLISH</option>
      <option>SCIENCE</option>
      <option>PHYSICS</option>
      <option>CHEMISTRY</option>
      <option>BIOLOGY</option>
      <option>COMPUTER SCIENCE</option>
    </select>

    <input type="password" id="password" placeholder="Enter password">

    <button onclick="loginTeacher()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h2>📊 MIS</h2>
    <button onclick="loadStudents()">Students</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <button onclick="toggleSidebar()">☰ Menu</button>

    <h1>Attendance Dashboard</h1>

    <select id="classSelect" onchange="loadStudents()"></select>

    <div id="students"></div>

    <h2>Summary</h2>
    <div id="summary"></div>

  </div>

</div>

</body>
</html>
