<!DOCTYPE html>
<html>
<head>
<title>Attendance SaaS Pro</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;

/* ================= LOGIN ================= */
const subjectPasswords = {
  MATHEMATICS:"mat12",
  ENGLISH:"engl12",
  SCIENCE:"sci12",
  PHYSICS:"phy12",
  CHEMISTRY:"chem12",
  BIOLOGY:"bio12",
  "COMPUTER SCIENCE":"cs12"
};

window.currentSubject = null;

/* LOGIN */
window.loginTeacher = function(){
  const subject = document.getElementById("subjectLogin").value;
  const pass = document.getElementById("password").value;

  if(subjectPasswords[subject] !== pass){
    alert("Wrong password!");
    return;
  }

  window.currentSubject = subject;
  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
};

/* ================= LOAD CLASSES ================= */
window.onload = function(){
  const select = document.getElementById("classSelect");

  ["P1","P2","P3","P4","P5","P6","S1","S2","S3","S4","S5","S6"]
  .forEach(c=>{
    select.innerHTML += `<option>${c}</option>`;
  });
};

/* ================= LOAD STUDENTS ================= */
window.loadStudents = async function () {

  const cls = document.getElementById("classSelect").value;
  const box = document.getElementById("attendanceTable");

  box.innerHTML = "";

  if (!cls) return;

  const snap = await getDocs(collection(db, "classStudents"));

  let html = `
  <table class="table">
    <tr>
      <th>Student</th>
      <th>Class</th>
      <th>✔ Present</th>
    </tr>
  `;

  snap.forEach(docSnap => {
    const s = docSnap.data();

    if (s.class === cls) {

      html += `
        <tr class="rowHover">
          <td>${s.name}</td>
          <td>${s.class}</td>
          <td>
            <input type="checkbox"
              class="checkbox"
              onchange="toggleAttendance('${s.name}', this.checked)">
          </td>
        </tr>
      `;
    }
  });

  html += `</table>`;

  box.innerHTML = html;
};
  window.toggleAttendance = function(name, isChecked){

  if (!window.tempAttendance) {
    window.tempAttendance = {};
  }

  window.tempAttendance[name] = isChecked ? "Present" : "Absent";

  console.log("TEMP:", window.tempAttendance);
};

 window.submitAttendance = async function(){

  const cls = document.getElementById("classSelect").value;

  if (!cls) {
    alert("Select class first!");
    return;
  }

  if (!window.tempAttendance || Object.keys(window.tempAttendance).length === 0) {
    alert("No attendance selected!");
    return;
  }

  for (let name in window.tempAttendance) {

    await addDoc(collection(db,"attendance"),{
      name,
      class: cls,
      subject: window.currentSubject,
      status: window.tempAttendance[name],
      date: new Date().toISOString().split("T")[0]
    });
  }

  alert("Attendance Submitted ✔");

  window.tempAttendance = {}; // RESET

  loadSummary(cls);
};TENDANCE ================= */
window.mark = async function(name, status, cls){

  await addDoc(collection(db,"attendance"),{
    name,
    class: cls,
    subject: window.currentSubject,
    status,
    date: new Date().toISOString().split("T")[0]
  });

  alert(name + " → " + status);

  loadSummary(cls);
};

/* ================= SUMMARY ================= */
window.loadSummary = async function(cls){

  const box = document.getElementById("summary");
  if(!box) return;

  const snap = await getDocs(collection(db,"attendance"));

  let data = {};

  snap.forEach(d=>{
    let a = d.data();

    if(a.class === cls && a.subject === window.currentSubject){

      if(!data[a.name]){
        data[a.name] = {P:0,A:0};
      }

      if(a.status==="Present") data[a.name].P++;
      else data[a.name].A++;
    }
  });

  let html = "<h3>📊 Summary</h3>";

  Object.keys(data).forEach(name=>{
    html += `
      <div class="card">
        <b>${name}</b>
        <span>✅ ${data[name].P} | ❌ ${data[name].A}</span>
      </div>
    `;
  });

  box.innerHTML = html;
};

</script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0f1f;color:white}

#loginBox{
  height:100vh;display:flex;justify-content:center;align-items:center;
  background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#111827);
}

.loginCard{
  width:320px;padding:25px;border-radius:15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
}

select,input,button{
  width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px;
}

button{cursor:pointer}

#app{display:none}

.sidebar{
  width:220px;height:100vh;position:fixed;
  background:#111827;padding:20px;
}

.main{margin-left:240px;padding:20px}

.card{
  background:#111827;padding:15px;margin:10px 0;
  border-radius:10px;display:flex;justify-content:space-between;
}

.present{background:green;color:white}
.absent{background:red;color:white}
  .table {
  width: 100%;
  border-collapse: collapse;
  background: #111827;
  border-radius: 12px;
  overflow: hidden;
  margin-top: 20px;
}

.table th, .table td {
  padding: 14px;
  border-bottom: 1px solid #1f2937;
}

.checkbox {
  transform: scale(1.4);
  cursor: pointer;
}

.submitBtn {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #0ea5e9;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.rowHover:hover {
  background: #1f2937;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">
    <h2>Teacher Login</h2>

    <select id="subjectLogin">
      <option>MATHEMATICS</option>
      <option>ENGLISH</option>
      <option>SCIENCE</option>
      <option>PHYSICS</option>
      <option>CHEMISTRY</option>
      <option>BIOLOGY</option>
      <option>COMPUTER SCIENCE</option>
    </select>

    <input type="password" id="password" placeholder="Password">

    <button onclick="loginTeacher()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app">

  <div class="sidebar">
    <h3>📊 MIS</h3>
    <button onclick="loadStudents()">Students</button>
  </div>

  <div class="main">

    <h2>Attendance Dashboard</h2>

    <select id="classSelect" onchange="loadStudents()"></select>

    <div id="students"></div>

   <div id="attendanceTable"></div>

<button onclick="submitAttendance()" class="submitBtn">
  SUBMIT ATTENDANCE
</button>

<div id="summary"></div>

  </div>

</div>

</body>
</html>
