<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Connect Firebase</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#050510,#0a1a2f);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

.container{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:30px;
  flex-wrap:wrap;
}

.card{
  width:270px;
  background:rgba(255,255,255,0.08);
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffff;
  margin-bottom:10px;
}

.btn{
  margin-top:6px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
}

.chat{background:#25D366;color:white;}
.call{background:#00ffff;color:black;}
.email{background:#ff00ff;color:white;}
.upload{background:#ffcc00;color:black;}

.hidden{display:none;}
a{text-decoration:none;}
</style>
</head>

<body>

<div class="header">
  <h1>🏫 Campus Connect (Full System)</h1>
</div>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <img id="img1" src="images/librarian.jpg">

    <h3>LIBRARIAN</h3>
    <p>CHEBET ASUMAN</p>
    <p>📞 +260702573532</p>

    <input type="file" id="file1" class="hidden" accept="image/*">

    <button class="btn upload" onclick="openFile('file1')">Upload Photo</button>

    <a href="https://wa.me/260702573532">
      <button class="btn chat">WhatsApp</button>
    </a>

    <a href="tel:+260702573532">
      <button class="btn call">Call</button>
    </a>

    <a href="mailto:chebetasuman@gmail.com">
      <button class="btn email">Email</button>
    </a>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <img id="img2" src="images/dean.jpg">

    <h3>DEAN OF STUDENTS</h3>
    <p>MUGABO DAVID</p>
    <p>📞 +250789531136</p>

    <input type="file" id="file2" class="hidden" accept="image/*">

    <button class="btn upload" onclick="openFile('file2')">Upload Photo</button>

    <a href="https://wa.me/250789531136">
      <button class="btn chat">WhatsApp</button>
    </a>

    <a href="tel:+250789531136">
      <button class="btn call">Call</button>
    </a>

    <a href="mailto:mugbodavid25@gmail.com">
      <button class="btn email">Email</button>
    </a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  storageBucket: "neomis-77b36.appspot.com",
  messagingSenderId: "836047126207",
  appId: "1:836047126207:web:df890a577383585698100a"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

/* OPEN FILE PICKER */
window.openFile = function(id){
  document.getElementById(id).click();
};

/* AUTO UPLOAD */
document.getElementById("file1").addEventListener("change", () => upload("file1","img1","librarian"));
document.getElementById("file2").addEventListener("change", () => upload("file2","img2","dean"));
async function upload(fileId, imgId, name){

  const input = document.getElementById(fileId);
  const file = input.files[0];

  if(!file){
    alert("Choose image first ❗");
    return;
  }

  console.log("Uploading file:", file.name);

  try{

    const storageRef = ref(storage, "campusconnect/" + name + ".jpg");

    console.log("Uploading to:", storageRef.fullPath);

    await uploadBytes(storageRef, file);

    const url = await getDownloadURL(storageRef);

    console.log("Download URL:", url);

    document.getElementById(imgId).src = url;

    alert("Upload successful ✅");

  } catch(error){
    console.log("UPLOAD ERROR:", error);
    alert(error.message);
  }
}

</script>

</body>
</html>
