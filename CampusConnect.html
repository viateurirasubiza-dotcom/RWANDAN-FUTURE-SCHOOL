<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Connect Firebase</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#050510,#0a1a2f);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

.container{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:30px;
  flex-wrap:wrap;
}

.card{
  width:260px;
  background:rgba(255,255,255,0.08);
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffff;
  margin-bottom:10px;
}

.btn{
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ffcc00;
  font-weight:bold;
}

/* 🔥 HIDE FILE INPUT */
.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <h1>🏫 Campus Connect (Upload without Choose File)</h1>
</div>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <img id="img1" src="images/librarian.jpg">
    <h3>LIBRARIAN</h3>

    <input type="file" id="file1" class="hidden" accept="image/*">

    <button class="btn" onclick="openFile('file1')">
      Upload Photo
    </button>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <img id="img2" src="images/dean.jpg">
    <h3>DEAN OF STUDENTS</h3>

    <input type="file" id="file2" class="hidden" accept="image/*">

    <button class="btn" onclick="openFile('file2')">
      Upload Photo
    </button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  storageBucket: "neomis-77b36.appspot.com",
  messagingSenderId: "836047126207",
  appId: "1:836047126207:web:df890a577383585698100a"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

/* 🔥 OPEN FILE AUTOMATICALLY */
window.openFile = function(fileId){
  document.getElementById(fileId).click();
};

/* 🔥 WHEN FILE SELECTED → UPLOAD AUTOMATIC */
document.getElementById("file1").addEventListener("change", () => upload("file1","img1","librarian"));
document.getElementById("file2").addEventListener("change", () => upload("file2","img2","dean"));

async function upload(fileId, imgId, name){

  const file = document.getElementById(fileId).files[0];
  if(!file){
    return;
  }

  const storageRef = ref(storage, "campusconnect/" + name + ".jpg");

  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  document.getElementById(imgId).src = url;

  alert("Upload successful ✅");
}

</script>

</body>
</html>
