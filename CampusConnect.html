<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Connect Firebase</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#050510,#0a1a2f);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
}

.container{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:30px;
  flex-wrap:wrap;
}

.card{
  width:270px;
  background:rgba(255,255,255,0.08);
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffff;
  margin-bottom:10px;
}

.btn{
  margin-top:6px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
}

.chat{background:#25D366;color:white;}
.call{background:#00ffff;color:black;}
.email{background:#ff00ff;color:white;}
.upload{background:#ffcc00;color:black;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
  <h1>🏫 Campus Connect (Base64 Firestore)</h1>
</div>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <img id="img1" src="">

    <h3>LIBRARIAN</h3>
    <p>CHEBET ASUMAN</p>
    <p>📞 +260702573532</p>

    <input type="file" id="file1" class="hidden" accept="image/*">

    <button class="btn upload" onclick="openFile('file1')">Upload Photo</button>

    <a href="https://wa.me/260702573532"><button class="btn chat">WhatsApp</button></a>
    <a href="tel:+260702573532"><button class="btn call">Call</button></a>
    <a href="mailto:chebetasuman@gmail.com"><button class="btn email">Email</button></a>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <img id="img2" src="">

    <h3>DEAN OF STUDENTS</h3>
    <p>MUGABO DAVID</p>
    <p>📞 +250789531136</p>

    <input type="file" id="file2" class="hidden" accept="image/*">

    <button class="btn upload" onclick="openFile('file2')">Upload Photo</button>

    <a href="https://wa.me/250789531136"><button class="btn chat">WhatsApp</button></a>
    <a href="tel:+250789531136"><button class="btn call">Call</button></a>
    <a href="mailto:mugbodavid25@gmail.com"><button class="btn email">Email</button></a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  appId: "1:836047126207:web:df890a577383585698100a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* OPEN FILE PICKER */
window.openFile = function(id){
  document.getElementById(id).click();
};

/* CONVERT + UPLOAD (BASE64) */
async function upload(fileId, imgId, name){

  const file = document.getElementById(fileId).files[0];
  if(!file){
    alert("Choose image first ❗");
    return;
  }

  const reader = new FileReader();

  reader.onload = async () => {
    const base64 = reader.result;

    // SAVE TO FIRESTORE
    await setDoc(doc(db, "campusConnect", name), {
      image: base64,
      updatedAt: Date.now()
    });

    document.getElementById(imgId).src = base64;

    alert("Upload successful ✔");
  };

  reader.readAsDataURL(file);
}

/* EVENTS */
document.getElementById("file1").addEventListener("change", () =>
  upload("file1","img1","librarian")
);

document.getElementById("file2").addEventListener("change", () =>
  upload("file2","img2","dean")
);

/* LOAD IMAGES FROM FIREBASE */
async function loadImages(){

  const doc1 = await getDoc(doc(db,"campusConnect","librarian"));
  if(doc1.exists()){
    document.getElementById("img1").src = doc1.data().image;
  }

  const doc2 = await getDoc(doc(db,"campusConnect","dean"));
  if(doc2.exists()){
    document.getElementById("img2").src = doc2.data().image;
  }
}

loadImages();

</script>

</body>
</html>
