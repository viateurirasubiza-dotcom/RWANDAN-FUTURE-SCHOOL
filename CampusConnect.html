<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Connect</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#050510,#0a1a2f);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 15px #00ffff55;
}

.header h1{
  color:#00ffff;
  margin:0;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  padding:10px 15px;
  background:#00ffff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:30px;
}

/* CARD */
.card{
  width:260px;
  background:rgba(255,255,255,0.08);
  border:1px solid #00ffff55;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px #00ffff88;
}

/* IMAGE */
.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffff;
  margin-bottom:10px;
}

/* BUTTONS */
.btn{
  display:block;
  margin:8px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.chat{
  background:#25D366;
  color:white;
}

.call{
  background:#00ffff;
}

.email{
  background:#ff00ff;
  color:white;
}
</style>
</head>

<body>

<div class="header">

  <p>Meet School Leaders & Contact Them</p>
