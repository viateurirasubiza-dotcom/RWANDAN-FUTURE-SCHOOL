<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Connect Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: "Segoe UI", Arial;
  background: radial-gradient(circle at top,#0f2a4a,#050510);
  color:white;
  min-height:100vh;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
  font-size:24px;
  font-weight:bold;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(0,255,255,0.2);

  box-shadow:0 0 20px rgba(0,255,255,0.1);
}

/* SEARCH BAR */
.search-bar{
  text-align:center;
  margin-top:15px;
}

.search-bar input{
  padding:12px;
  width:55%;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;

  background:rgba(255,255,255,0.1);
  color:white;

  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.2);
}

/* DASHBOARD GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  padding:40px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(0,255,255,0.15);
  border-radius:22px;
  padding:20px;
  text-align:center;

  backdrop-filter:blur(18px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);

  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 30px rgba(0,255,255,0.25);
}

/* IMAGE */
.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;

  border:3px solid #00ffff;
  box-shadow:0 0 20px rgba(0,255,255,0.4);

  transition:0.3s;
}

.card img:hover{
  transform:scale(1.08);
}

/* TEXT */
.card h3{
  margin:12px 0 5px;
  color:#00ffff;
  letter-spacing:1px;
}

.card p{
  margin:4px 0;
  opacity:0.85;
  font-size:14px;
}

/* BUTTONS */
.btn{
  margin-top:8px;
  padding:11px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  width:100%;

  transition:0.3s;
}

.chat{
  background:linear-gradient(90deg,#25D366,#1ebc57);
  color:white;
}

.call{
  background:linear-gradient(90deg,#00c8ff,#0077ff);
  color:white;
}

.email{
  background:linear-gradient(90deg,#ff4dff,#b300ff);
  color:white;
}

.btn:hover{
  transform:scale(1.05);
  opacity:0.95;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

/* UPLOAD LABEL */
.hidden{display:none;}

.upload-label{
  display:block;
  margin-top:10px;
  padding:10px;
  background:linear-gradient(90deg,#00ffff,#ff00ff);
  border-radius:12px;
  cursor:pointer;
  font-size:13px;
  font-weight:bold;
  transition:0.3s;
}

.upload-label:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,255,255,0.4);
}

/* MOBILE */
@media(max-width:600px){
  .search-bar input{width:85%;}
  .container{padding:20px;}
}
</style>
</head>

<body>

<div class="header">
  🏫 Campus Connector
</div>

<div class="search-bar">
  <input type="text" placeholder="Search staff... 🔍">
</div>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <img id="img1">

    <h3><i class="fa-solid fa-book"></i> LIBRARIAN</h3>
    <p>CHEBET ASUMAN</p>
    <p>📞 +260702573532</p>

    <input type="file" id="file1" class="hidden" accept="image/*">
 

    <a href="https://wa.me/260702573532"><button class="btn chat">WhatsApp</button></a>
    <a href="tel:+260702573532"><button class="btn call">Call</button></a>
    <a href="mailto:chebetasuman@gmail.com"><button class="btn email">Email</button></a>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <img id="img2">

    <h3><i class="fa-solid fa-user-tie"></i> DEAN</h3>
    <p>MUGABO DAVID</p>
    <p>📞 +250789531136</p>

    <input type="file" id="file2" class="hidden" accept="image/*">
  

    <a href="https://wa.me/250789531136"><button class="btn chat">WhatsApp</button></a>
    <a href="tel:+250789531136"><button class="btn call">Call</button></a>
    <a href="mailto:mugbodavid25@gmail.com"><button class="btn email">Email</button></a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* UPLOAD BASE64 */
function upload(fileId, imgId, name){

  const file = document.getElementById(fileId).files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async () => {
    const base64 = reader.result;

    await setDoc(doc(db,"campusConnect",name),{
      image: base64,
      updatedAt: Date.now()
    });

    document.getElementById(imgId).src = base64;
  };

  reader.readAsDataURL(file);
}

document.getElementById("file1").addEventListener("change",()=>upload("file1","img1","librarian"));
document.getElementById("file2").addEventListener("change",()=>upload("file2","img2","dean"));

/* LOAD */
async function load(){
  const d1 = await getDoc(doc(db,"campusConnect","librarian"));
  if(d1.exists()) document.getElementById("img1").src = d1.data().image;

  const d2 = await getDoc(doc(db,"campusConnect","dean"));
  if(d2.exists()) document.getElementById("img2").src = d2.data().image;
}
load();

</script>

</body>
</html>
