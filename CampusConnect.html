<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Connect</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#050510,#0a1a2f);
  color:white;
}

a{text-decoration:none;}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 15px #00ffff55;
}

.header h1{
  color:#00ffff;
  margin:0;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  padding:10px 15px;
  background:#00ffff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:30px;
}

/* CARD */
.card{
  width:260px;
  background:rgba(255,255,255,0.08);
  border:1px solid #00ffff55;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

/* IMAGE CIRCLE */
.card img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffff;
  margin-bottom:10px;
}

/* BUTTONS */
.btn{
  display:block;
  margin:6px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.chat{background:#25D366;color:white;}
.call{background:#00ffff;color:black;}
.email{background:#ff00ff;color:white;}
.upload{background:#ffcc00;color:black;}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="header">
  <h1>🏫 Campus Connect</h1>
  <p>Meet School Leaders & Contact Them</p>
</div>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <img id="img1" src="images/librarian.jpg">
    <h3>LIBRARIAN</h3>
    <p>CHEBET ASUMAN</p>

    <input type="file" accept="image/*" onchange="loadImage(event,'img1')">

    <a href="https://wa.me/260702573532"><button class="btn chat">WhatsApp</button></a>
    <a href="tel:+260702573532"><button class="btn call">Call</button></a>
    <a href="mailto:chebetasuman@gmail.com"><button class="btn email">Email</button></a>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <img id="img2" src="images/dean.jpg">
    <h3>DEAN OF STUDENTS</h3>
    <p>MUGABO DAVID</p>

    <input type="file" accept="image/*" onchange="loadImage(event,'img2')">

    <a href="https://wa.me/250789531136"><button class="btn chat">WhatsApp</button></a>
    <a href="tel:+250789531136"><button class="btn call">Call</button></a>
    <a href="mailto:mugbodavid25@gmail.com"><button class="btn email">Email</button></a>
  </div>

</div>

<script>
function loadImage(event, id){
  const img = document.getElementById(id);
  img.src = URL.createObjectURL(event.target.files[0]);
}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
