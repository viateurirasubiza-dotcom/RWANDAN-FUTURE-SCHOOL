<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background:linear-gradient(135deg,#050510,#0a1a2f);
color:white;min-height:100vh;
}

/* LOGIN */
#loginBox{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
padding:30px;
background:#000000cc;
border-radius:15px;
z-index:999;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}
.card{
background:rgba(255,255,255,0.08);
padding:15px;border-radius:10px;
text-align:center;
}

/* SECTIONS */
.section{
margin:20px;
padding:15px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}

button{
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="section">
<h2>Check Payment</h2>

<select id="classSelect" onchange="filterByClass()">
<option value="">Class</option>
<option>S1</option><option>S2</option><option>S3</option>
<option>S4</option><option>S5</option><option>S6</option>
</select>

<br><br>

<select id="studentSelect" onchange="showStudentPayment()"></select>

<div id="paymentBox">No student selected</div>
</div>

<div class="section">
<h2>Add Payment</h2>

<select id="payClass" onchange="loadStudentsForPay()">
<option value="">Class</option>
<option>S1</option><option>S2</option><option>S3</option>
<option>S4</option><option>S5</option><option>S6</option>
</select>

<br><br>

<select id="payStudent"></select>

<br><br>

<input id="amountPaid" type="number" placeholder="Amount">

<br><br>

<button onclick="savePayment()">Save</button>
</div>

</div>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="card"><h3>Students</h3><h2 id="studentsCount">0</h2></div>
<div class="card"><h3>Income</h3><h2 id="income">0</h2></div>
<div class="card"><h3>Balance</h3><h2 id="balance">0</h2></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
doc,
getDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSy....",
authDomain:"neomis-77b36.firebaseapp.com",
projectId:"neomis-77b36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.allStudents = [];

/* LOGIN */
window.login = function(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
loadStudents();
listenFinance();
}else{
document.getElementById("error").innerText="Wrong login";
}
};

/* LOAD STUDENTS */
async function loadStudents(){
const snap = await getDocs(collection(db,"students"));

window.allStudents = [];

let select = document.getElementById("studentSelect");
select.innerHTML="";

snap.forEach(d=>{
let s=d.data();
window.allStudents.push({id:d.id,...s});

let opt=document.createElement("option");
opt.value=d.id;
opt.textContent=s.name;
select.appendChild(opt);
});

document.getElementById("studentsCount").innerText = window.allStudents.length;
}

/* FILTER */
window.filterByClass=function(){
let cls=document.getElementById("classSelect").value;

let select=document.getElementById("studentSelect");
select.innerHTML="";

window.allStudents.filter(s=>s.class===cls)
.forEach(s=>{
let opt=document.createElement("option");
opt.value=s.id;
opt.textContent=s.name;
select.appendChild(opt);
});
};

/* SHOW PAYMENT */
window.showStudentPayment=function(){
let id=document.getElementById("studentSelect").value;
let s=window.allStudents.find(x=>x.id===id);

document.getElementById("paymentBox").innerHTML =
s ? `${s.name} | Paid: ${s.paid||0} | Balance: ${s.balance||0}`
: "No student selected";
};

/* LOAD PAY STUDENTS */
window.loadStudentsForPay=function(){
let cls=document.getElementById("payClass").value;
let select=document.getElementById("payStudent");

select.innerHTML="";

window.allStudents.filter(s=>s.class===cls)
.forEach(s=>{
let opt=document.createElement("option");
opt.value=s.id;
opt.textContent=s.name;
select.appendChild(opt);
});
};

/* SAVE PAYMENT */
window.savePayment = async function(){

let id=document.getElementById("payStudent").value;
let amount=Number(document.getElementById("amountPaid").value);

if(!id||!amount) return alert("Fill all");

let ref=doc(db,"students",id);
let snap=await getDoc(ref);

if(!snap.exists()) return alert("Not found");

let s=snap.data();

let newPaid=(s.paid||0)+amount;
let newBalance=(s.totalFees||100000)-(newPaid);

await updateDoc(ref,{
paid:newPaid,
balance:newBalance
});

await addDoc(collection(db,"payments"),{
studentId:id,
name:s.name,
class:s.class,
amount,
date:new Date()
});

alert("Payment saved");
loadStudents();
};

/* FINANCE */
function listenFinance(){
onSnapshot(collection(db,"finance"),snap=>{
let income=0,expenses=0;

snap.forEach(d=>{
income+=d.data().income||0;
expenses+=d.data().expenses||0;
});

document.getElementById("income").innerText=income;
document.getElementById("balance").innerText=income-expenses;
});
}

</script>

</body>
</html>
