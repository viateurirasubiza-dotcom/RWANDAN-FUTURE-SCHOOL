<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rwandan Future - Finance System</title>
<style>
/* GENERAL BODY */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN CARD */
.login-card {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.login-card h2 {
    margin-bottom: 30px;
    color: #1e3a8a;
    font-size: 24px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.login-card input:focus {
    border: 2px solid #1e3a8a;
    outline: none;
}

.login-card button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #1e3a8a;
    color: white;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s, transform 0.2s;
}

.login-card button:hover {
    background: #14285f;
    transform: scale(1.05);
}

.login-card p {
    margin-top: 10px;
    color: red;
    font-weight: bold;
    font-size: 14px;
}

/* DASHBOARD PAGE */
#dashboardPage {
    display: none;
    width: 100%;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
}

/* HEADER */
header {
    background: #1e3a8a;
    color: white;
    padding: 15px;
    text-align: center;
    position: relative;
}

header button {
    position: absolute;
    right: 20px;
    top: 15px;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    background: #dc2626;
    color: white;
    cursor: pointer;
}

header button:hover {
    background: #b91c1c;
}

/* DASHBOARD CARDS */
.dashboard {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin: 20px;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    width: 22%;
    min-width: 150px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    margin-bottom: 15px;
}

/* SEARCH BOX */
.search-box {
    text-align: center;
    margin: 20px;
}

.search-box input, .search-box select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin: 5px;
}

/* TABLE */
table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    background: white;
    color: black;
    margin-bottom: 20px;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #1e3a8a;
    color: white;
}

/* STATUS COLORS */
.paid { color: green; font-weight: bold; }
.unpaid { color: red; font-weight: bold; }
.partial { color: orange; font-weight: bold; }

/* REPORT */
.report {
    margin: 20px auto;
    padding: 15px;
    background: white;
    color: black;
    width: 90%;
    border-radius: 10px;
}

/* ACTION BUTTONS */
.action-btn {
    padding: 6px 10px;
    margin: 2px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: white;
}

.view-btn { background: #1e3a8a; }
.edit-btn { background: #f59e0b; }
.delete-btn { background: #dc2626; }
.receipt-btn { background: #16a34a; }

.action-btn:hover {
    transform: scale(1.05);
}

</style>
</head>
<body>

<script>
let payments = [];
// Sample Data
let students = [
    {name:"Jean", class:"S3", fee:50000, paid:50000},
    {name:"Aline", class:"S2", fee:50000, paid:20000},
    {name:"Eric", class:"S1", fee:50000, paid:0},
    {name:"Bella", class:"S3", fee:50000, paid:30000}
];

// Users
const users = [
    { username: "admin", password: "admin123" },
    { username: "staff", password: "staff123" }
];

// STATUS FUNCTION
function getStatus(s){
    if(s.paid >= s.fee) return "Paid";
    if(s.paid > 0) return "Partial";
    return "Unpaid";
}

// RENDER TABLE
function renderTable() {
    let table = document.getElementById("studentTable");
    let search = document.getElementById("search").value.toLowerCase();
    table.innerHTML = "";

    students.forEach(s => {
        if (s.name.toLowerCase().includes(search)) {
            let balance = s.fee - s.paid;
            let status = getStatus(s);

            table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.class}</td>
                <td>${s.fee}</td>
                <td>${s.paid}</td>
                <td>${balance}</td>
                <td class="${status.toLowerCase()}">${status}</td>
                <td>
                    <button class="action-btn view-btn" onclick="showStudent('${s.name}')">View</button>
                    <button class="action-btn edit-btn" onclick="editStudent('${s.name}')">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteStudent('${s.name}')">Delete</button>
                    <button class="action-btn receipt-btn" onclick="downloadReceipt('${s.name}')">Receipt</button>
                </td>
            </tr>`;
        }
    });
updateDashboard();
generateReport();
generateReports();
}

// DASHBOARD UPDATE
function updateDashboard(){
    document.getElementById("totalStudents").innerText = students.length;
    let paid = students.filter(s => s.paid >= s.fee).length;
    let unpaid = students.filter(s => s.paid < s.fee).length;
    let totalFees = students.reduce((a,b)=>a + b.fee, 0);
    document.getElementById("paidStudents").innerText = paid;
    document.getElementById("unpaidStudents").innerText = unpaid;
    document.getElementById("totalFees").innerText = totalFees;
}

// REPORT
function generateReport(){
    let total = students.reduce((sum, s)=> sum + s.fee, 0);
    let collected = students.reduce((sum, s)=> sum + s.paid, 0);
    document.getElementById("reportData").innerText =
    `Total Expected: ${total} | Collected: ${collected} | Balance: ${total-collected}`;
}

// STUDENT ACTIONS
function showStudent(name){
    let s = students.find(x => x.name === name);
    alert(`Student: ${s.name}\nClass: ${s.class}\nFee: ${s.fee}\nPaid: ${s.paid}\nBalance: ${s.fee - s.paid}\nStatus: ${getStatus(s)}`);
}

function deleteStudent(name){
    students = students.filter(s => s.name !== name);
    renderTable();
}

function editStudent(name){
    let s = students.find(x => x.name === name);
    let newPaid = prompt("Update paid amount for " + s.name, s.paid);
    if(newPaid !== null){
        s.paid = parseInt(newPaid);
        renderTable();
    }
}

function downloadReceipt(name){

    let s = students.find(x => x.name === name);

    let balance = s.fee - s.paid;
    let today = new Date().toLocaleDateString();

    let receiptNo = "RF-" + Date.now();

    let receipt = `
========================================
   BRIGHT ACADEMY SCHOOL
========================================

Receipt No : ${receiptNo}
Date       : ${today}

----------------------------------------
STUDENT INFORMATION
----------------------------------------

Student Name : ${s.name}
Class        : ${s.class}

----------------------------------------
PAYMENT DETAILS
----------------------------------------

School Fee   : ${s.fee} RWF
Paid Amount  : ${s.paid} RWF
Balance      : ${balance} RWF
Status       : ${getStatus(s)}

----------------------------------------
RECEIVED BY
----------------------------------------

Finance Officer Signature:
__________________________

School Stamp:
__________________________

========================================
      THANK YOU FOR YOUR PAYMENT
========================================
`;

    let blob = new Blob([receipt], {type:"text/plain"});

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${s.name}_Receipt.txt`;
    link.click();
}
function addStudent() {

    let name = document.getElementById("newName").value;
    let sclass = document.getElementById("newClass").value;
    let fee = parseInt(document.getElementById("newFee").value);
    let paid = parseInt(document.getElementById("newPaid").value) || 0;
    let month = document.getElementById("month").value;

    if (!name || !sclass || isNaN(fee)) {
        alert("Please select name, class and enter valid fee!");
        return;
    }

    // Reba niba asanzwe ari muri system
    let existingStudent = students.find(
        s => s.name === name && s.class === sclass
    );

    if(existingStudent){

        // Ongeraho amafaranga mashya ku yari yarishyuye
        existingStudent.paid += paid;

    }else{

        // Niba ari ubwa mbere yishyura
        students.push({
            name: name,
            class: sclass,
            fee: fee,
            paid: paid
        });

    }

    // Bika transaction muri monthly report
    payments.push({
        date: new Date().toLocaleDateString(),
        name: name,
        class: sclass,
        amount: paid,
        month: month
    });

    document.getElementById("newName").value = "";
    document.getElementById("newClass").value = "";
    document.getElementById("newFee").value = "";
    document.getElementById("newPaid").value = "";

    renderTable();
    generateReports();
}

// LOGIN & LOGOUT
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const validUser = users.find(u => u.username === user && u.password === pass);
    if(validUser){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboardPage").style.display = "block";
        renderTable();
    } else {
        document.getElementById("loginError").innerText = "Invalid username or password!";
    }
}

function logout(){
    document.getElementById("dashboardPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("loginError").innerText = "";
}
function generateReports(){

let m1 = document.getElementById("month1Table");
let m2 = document.getElementById("month2Table");
let m3 = document.getElementById("month3Table");

m1.innerHTML="";
m2.innerHTML="";
m3.innerHTML="";

let total1=0;
let total2=0;
let total3=0;

payments.forEach(p=>{

let row=`
<tr>
<td>${p.date}</td>
<td>${p.name}</td>
<td>${p.class}</td>
<td>${p.amount}</td>
</tr>
`;

if(p.month==="Month 1"){
m1.innerHTML += row;
total1 += p.amount;
}

if(p.month==="Month 2"){
m2.innerHTML += row;
total2 += p.amount;
}

if(p.month==="Month 3"){
m3.innerHTML += row;
total3 += p.amount;
}

});

let grandTotal = total1 + total2 + total3;

document.getElementById("annualReport").innerHTML=`
<table>
<tr>
<th>Month</th>
<th>Total Collected</th>
</tr>

<tr>
<td>Month 1</td>
<td>${total1}</td>
</tr>

<tr>
<td>Month 2</td>
<td>${total2}</td>
</tr>

<tr>
<td>Month 3</td>
<td>${total3}</td>
</tr>

<tr style="background:#1e3a8a;color:white">
<td><b>Total 3 Months</b></td>
<td><b>${grandTotal}</b></td>
</tr>
</table>
`;
}
</script>
