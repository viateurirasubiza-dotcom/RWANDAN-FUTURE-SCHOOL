<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#050510,#0a1a2f);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* 🌟 NEON BACKGROUND */
body::before{
content:"";
position:fixed;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 60%);
animation:move 8s linear infinite;
z-index:0;
}

@keyframes move{
0%{transform:translate(0,0);}
50%{transform:translate(100px,80px);}
100%{transform:translate(0,0);}
}

/* PARTICLES */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
overflow:hidden;
pointer-events:none;
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#00ffff;
border-radius:50%;
opacity:0.6;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh);opacity:0;}
to{transform:translateY(-10vh);opacity:1;}
}

/* LOGIN BOX (FIXED - ONLY ONCE) */
#loginBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:330px;
padding:30px;
background:rgba(0,0,0,0.85);
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
z-index:9999;
backdrop-filter:blur(10px);

border:2px solid transparent;
background-clip:padding-box;
box-shadow:0 0 25px #00ffff;
animation:borderGlow 3s linear infinite;
}

@keyframes borderGlow{
0%{box-shadow:0 0 10px #00ffff;}
50%{box-shadow:0 0 30px #ff00ff;}
100%{box-shadow:0 0 10px #00ffff;}
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:25px;
position:relative;
z-index:1;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(0,255,255,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 25px #00ffff;
}

.card h3{ color:#00ffff; }

/* SECTION */
.section{
margin:20px;
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
z-index:1;
position:relative;
}

table{
width:100%;
border-collapse:collapse;
}

table th, table td{
padding:10px;
border:1px solid rgba(255,255,255,.2);
text-align:center;
}

table th{
background:#00ffff;
color:black;
}

/* BUTTONS */
.btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.print{ background:#25D366; color:white; }
.report{ background:#ffcc00; color:black; }

#reportBox{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:15px;
min-height:120px;
}
</style>
</head>

<body>

<div id="particles"></div>

<!-- LOGIN -->
<div id="loginBox">
<h2>Finance Panel</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<button onclick="logout()" style="
position:fixed;top:15px;right:15px;
padding:10px 15px;border:none;
border-radius:10px;background:red;
color:white;font-weight:bold;
cursor:pointer;box-shadow:0 0 10px red;">
Logout
</button>

<div class="dashboard">
<div class="card"><h3>Students</h3><h2>650</h2></div>
<div class="card"><h3>Fees</h3><h2>50,000,000 RWF</h2></div>
<div class="card"><h3>Balance</h3><h2>12,000,000 RWF</h2></div>
<div class="card"><h3>Receipts</h3><h2>540</h2></div>
<div class="card"><h3>Expenses</h3><h2>15,000,000 RWF</h2></div>
<div class="card"><h3>Account</h3><h2>35,000,000 RWF</h2></div>
</div>

<div class="section">
<h2>Student Fees</h2>
<table>
<tr><th>Student</th><th>Class</th><th>Paid</th><th>Balance</th></tr>
<tr><td>John</td><td>S6</td><td>150,000</td><td>50,000</td></tr>
<tr><td>Jane</td><td>S5</td><td>200,000</td><td>0</td></tr>
</table>
</div>

<div class="section">
<h2>Receipts</h2>
<p>Receipt RC-001</p>
<button class="btn print" onclick="downloadReceipt()">Download</button>
</div>

<div class="section">
<h2>Reports</h2>
<button class="btn report" onclick="showReport('daily')">Daily</button>
<button class="btn report" onclick="showReport('weekly')">Weekly</button>
<button class="btn report" onclick="showReport('monthly')">Monthly</button>
<button class="btn report" onclick="showReport('term')">Term</button>
<button class="btn report" onclick="showReport('annual')">Annual</button>

<div id="reportBox">Click report...</div>
</div>

</div>

<script>
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
}else{
document.getElementById("error").innerText="Wrong login!";
}
}

function logout(){
document.getElementById("app").style.display="none";
document.getElementById("loginBox").style.display="flex";
}

function showReport(t){
let b=document.getElementById("reportBox");

if(t==="daily") b.innerHTML="Daily Income 500k";
else if(t==="weekly") b.innerHTML="Weekly 3.5M";
else if(t==="monthly") b.innerHTML="Monthly 12M";
else if(t==="term") b.innerHTML="Term 35M";
else b.innerHTML="Annual 50M";
}

function createParticles(){
let c=document.getElementById("particles");
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(5+Math.random()*10)+"s";
c.appendChild(p);
}
}
createParticles();

function downloadReceipt(){
const t="Receipt RC-001\nJohn Doe\n150,000 RWF";
const b=new Blob([t],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="receipt.txt";
a.click();
}
</script>

</body>
</html>
