<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance System</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050510,#0a1a2f);
color:white;
}

/* LOGIN */
.login-box{
width:320px;
margin:120px auto;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #00ffff55;
}

.login-box h2{
color:#00ffff;
margin-bottom:15px;
}

.login-box input{
width:90%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
outline:none;
}

.login-box button{
width:95%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{
display:none;
}

.header{
background:rgba(0,0,0,0.6);
padding:20px;
text-align:center;
}

.back-btn{
position:fixed;
top:15px;
left:15px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#00ffff;
font-weight:bold;
cursor:pointer;
}

/* logout */
.logout{
position:fixed;
top:15px;
right:15px;
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

/* cards */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
text-align:center;
}

.card h3{color:#00ffff;}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="login-box">
<h2>💰 Finance Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard">

<button class="logout" onclick="logout()">Logout</button>

<div class="header">
<h1>💰 Finance Management Panel</h1>
</div>

<div class="dashboard">

<div class="card"><h3>Students</h3><p>650</p></div>
<div class="card"><h3>Fees</h3><p>50M RWF</p></div>
<div class="card"><h3>Balance</h3><p>35M RWF</p></div>
<div class="card"><h3>Expenses</h3><p>15M RWF</p></div>

</div>

</div>

<script>

/* 🔐 LOGIN */
function login(){
let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u === "FINANCE" && p === "1234"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("dashboard").style.display = "block";
}
else{
alert("Invalid login ❌");
}
}

/* 🚪 LOGOUT */
function logout(){
document.getElementById("dashboard").style.display = "none";
document.getElementById("loginBox").style.display = "block";
document.getElementById("username").value = "";
document.getElementById("password").value = "";
}

</script>

</body>
</html>
