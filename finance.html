<!DOCTYPE html>
<html>
<head>
<title>Finance Dashboard</title>
</head>
<body>

<h1>Finance Dashboard</h1>

<h2>Total Collected:
<span id="total">0</span> RWF
</h2>

<div id="payments"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSy....",
authDomain:"neomis-77b36.firebaseapp.com",
projectId:"neomis-77b36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const snap = await getDocs(
collection(db,"financePayments")
);

let total = 0;
let html = "";

snap.forEach(doc=>{

const p = doc.data();

total += Number(p.amount);

html += `
<div style="
padding:10px;
margin:5px;
border:1px solid #ccc;">
<b>${p.student}</b><br>
${p.class}<br>
${p.amount} RWF
</div>
`;

});

document.getElementById("total")
.innerText = total;

document.getElementById("payments")
.innerHTML = html;

</script>

</body>
</html>
