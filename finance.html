<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rwandan Future - Finance System</title>
<style>
/* GENERAL BODY */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN CARD */
.login-card {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.login-card h2 {
    margin-bottom: 30px;
    color: #1e3a8a;
    font-size: 24px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.login-card input:focus {
    border: 2px solid #1e3a8a;
    outline: none;
}

.login-card button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #1e3a8a;
    color: white;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s, transform 0.2s;
}

.login-card button:hover {
    background: #14285f;
    transform: scale(1.05);
}

.login-card p {
    margin-top: 10px;
    color: red;
    font-weight: bold;
    font-size: 14px;
}

/* DASHBOARD PAGE */
#dashboardPage {
    display: none;
    width: 100%;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
}

/* HEADER */
header {
    background: #1e3a8a;
    color: white;
    padding: 15px;
    text-align: center;
    position: relative;
}

header button {
    position: absolute;
    right: 20px;
    top: 15px;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    background: #dc2626;
    color: white;
    cursor: pointer;
}

header button:hover {
    background: #b91c1c;
}

/* DASHBOARD CARDS */
.dashboard {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin: 20px;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    width: 22%;
    min-width: 150px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    margin-bottom: 15px;
}

/* SEARCH BOX */
.search-box {
    text-align: center;
    margin: 20px;
}

.search-box input, .search-box select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin: 5px;
}

/* TABLE */
table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    background: white;
    color: black;
    margin-bottom: 20px;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #1e3a8a;
    color: white;
}

/* STATUS COLORS */
.paid { color: green; font-weight: bold; }
.unpaid { color: red; font-weight: bold; }
.partial { color: orange; font-weight: bold; }

/* REPORT */
.report {
    margin: 20px auto;
    padding: 15px;
    background: white;
    color: black;
    width: 90%;
    border-radius: 10px;
}

/* ACTION BUTTONS */
.action-btn {
    padding: 6px 10px;
    margin: 2px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: white;
}

.view-btn { background: #1e3a8a; }
.edit-btn { background: #f59e0b; }
.delete-btn { background: #dc2626; }
.receipt-btn { background: #16a34a; }

.action-btn:hover {
    transform: scale(1.05);
}

</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-card">
    <h2>🔐 Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginError"></p>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage">

    <header>
        <h1>Rwandan Future Finance System</h1>
        <button onclick="logout()">Logout</button>
    </header>

    <div class="dashboard">
        <div class="card">Total Students<br><h2 id="totalStudents"></h2></div>
        <div class="card">Paid<br><h2 id="paidStudents"></h2></div>
        <div class="card">Unpaid<br><h2 id="unpaidStudents"></h2></div>
        <div class="card">Total Fees<br><h2 id="totalFees"></h2></div>
    </div>

    <div class="search-box">
        <h3>Add New Student</h3>
        <select id="newName">
            <option value="">Select Student Name</option>
            <option>Jean</option>
            <option>Aline</option>
            <option>Eric</option>
            <option>Bella</option>
        </select>
        <select id="newClass">
            <option value="">Select Class</option>
            <option>P1</option><option>P2</option><option>P3</option>
            <option>P4</option><option>P5</option><option>P6</option>
            <option>S1</option><option>S2</option><option>S3</option>
            <option>S4</option><option>S5</option><option>S6</option>
        </select>
        <input type="number" id="newFee" placeholder="Fee">
        <input type="number" id="newPaid" placeholder="Paid">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="search-box">
        <input type="text" id="search" onkeyup="renderTable()" placeholder="Search student name...">
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Fee</th>
                <th>Paid</th>
                <th>Balance</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

    <div class="report">
        <h2>Term Report</h2>
        <p id="reportData"></p>
    </div>

</div>

<script>
// Sample Data
let students = [
    {name:"Jean", class:"S3", fee:50000, paid:50000},
    {name:"Aline", class:"S2", fee:50000, paid:20000},
    {name:"Eric", class:"S1", fee:50000, paid:0},
    {name:"Bella", class:"S3", fee:50000, paid:30000}
];

// Users
const users = [
    { username: "admin", password: "admin123" },
    { username: "staff", password: "staff123" }
];

// STATUS FUNCTION
function getStatus(s){
    if(s.paid >= s.fee) return "Paid";
    if(s.paid > 0) return "Partial";
    return "Unpaid";
}

// RENDER TABLE
function renderTable() {
    let table = document.getElementById("studentTable");
    let search = document.getElementById("search").value.toLowerCase();
    table.innerHTML = "";

    students.forEach(s => {
        if (s.name.toLowerCase().includes(search)) {
            let balance = s.fee - s.paid;
            let status = getStatus(s);

            table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.class}</td>
                <td>${s.fee}</td>
                <td>${s.paid}</td>
                <td>${balance}</td>
                <td class="${status.toLowerCase()}">${status}</td>
                <td>
                    <button class="action-btn view-btn" onclick="showStudent('${s.name}')">View</button>
                    <button class="action-btn edit-btn" onclick="editStudent('${s.name}')">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteStudent('${s.name}')">Delete</button>
                    <button class="action-btn receipt-btn" onclick="downloadReceipt('${s.name}')">Receipt</button>
                </td>
            </tr>`;
        }
    });

    updateDashboard();
    generateReport();
}

// DASHBOARD UPDATE
function updateDashboard(){
    document.getElementById("totalStudents").innerText = students.length;
    let paid = students.filter(s => s.paid >= s.fee).length;
    let unpaid = students.filter(s => s.paid < s.fee).length;
    let totalFees = students.reduce((a,b)=>a + b.fee, 0);
    document.getElementById("paidStudents").innerText = paid;
    document.getElementById("unpaidStudents").innerText = unpaid;
    document.getElementById("totalFees").innerText = totalFees;
}

// REPORT
function generateReport(){
    let total = students.reduce((sum, s)=> sum + s.fee, 0);
    let collected = students.reduce((sum, s)=> sum + s.paid, 0);
    document.getElementById("reportData").innerText =
    `Total Expected: ${total} | Collected: ${collected} | Balance: ${total-collected}`;
}

// STUDENT ACTIONS
function showStudent(name){
    let s = students.find(x => x.name === name);
    alert(`Student: ${s.name}\nClass: ${s.class}\nFee: ${s.fee}\nPaid: ${s.paid}\nBalance: ${s.fee - s.paid}\nStatus: ${getStatus(s)}`);
}

function deleteStudent(name){
    students = students.filter(s => s.name !== name);
    renderTable();
}

function editStudent(name){
    let s = students.find(x => x.name === name);
    let newPaid = prompt("Update paid amount for " + s.name, s.paid);
    if(newPaid !== null){
        s.paid = parseInt(newPaid);
        renderTable();
    }
}

function downloadReceipt(name){
    let s = students.find(x => x.name === name);
    let balance = s.fee - s.paid;
    let receipt = `
Rwandan Future Finance System
-----------------------------
Student: ${s.name}
Class: ${s.class}
Fee: ${s.fee}
Paid: ${s.paid}
Balance: ${balance}
Status: ${getStatus(s)}
-----------------------------
Thank you!
`;
    let blob = new Blob([receipt], {type: "text/plain"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${s.name}_receipt.txt`;
    link.click();
}

function addStudent() {
    let name = document.getElementById("newName").value;
    let sclass = document.getElementById("newClass").value;
    let fee = parseInt(document.getElementById("newFee").value);
    let paid = parseInt(document.getElementById("newPaid").value) || 0;

    if (!name || !sclass || isNaN(fee)) {
        alert("Please select name, class and enter valid fee!");
        return;
    }

    students.push({ name: name, class: sclass, fee: fee, paid: paid });
    document.getElementById("newName").value = "";
    document.getElementById("newClass").value = "";
    document.getElementById("newFee").value = "";
    document.getElementById("newPaid").value = "";

    renderTable();
}

// LOGIN & LOGOUT
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const validUser = users.find(u => u.username === user && u.password === pass);
    if(validUser){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboardPage").style.display = "block";
        renderTable();
    } else {
        document.getElementById("loginError").innerText = "Invalid username or password!";
    }
}

function logout(){
    document.getElementById("dashboardPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("loginError").innerText = "";
}
</script>
</body>
</html>
