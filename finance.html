<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#050510,#0a1a2f);
color:white;
min-height:100vh;
}

/* LOGIN */
#loginBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000000cc;
padding:25px;
border-radius:12px;
z-index:999;
text-align:center;
}

input,select{
padding:10px;
margin:5px;
width:200px;
border-radius:6px;
border:none;
}

/* APP */
#app{
display:none;
padding:20px;
}

.section{
background:rgba(255,255,255,0.08);
padding:15px;
margin:15px 0;
border-radius:10px;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
text-align:center;
}
button{
padding:10px;
margin-top:10px;
cursor:pointer;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Finance Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<!-- APP -->
<div id="app">

<div class="section">
<h2>Check Payment</h2>

<select id="classSelect" onchange="filterByClass()">
<option value="">All Classes</option>
<option>S1</option><option>S2</option><option>S3</option>
<option>S4</option><option>S5</option><option>S6</option>
</select>

<br>

<select id="studentSelect" onchange="showStudentPayment()"></select>

<div id="paymentBox">Select student</div>
</div>

<div class="section">
<h2>Add Payment</h2>

<select id="payClass" onchange="loadStudentsForPay()">
<option value="">Class</option>
<option>S1</option><option>S2</option><option>S3</option>
<option>S4</option><option>S5</option><option>S6</option>
</select>

<br>

<select id="payStudent"></select>

<br>

<input id="amountPaid" type="number" placeholder="Amount">

<br>

<button onclick="savePayment()">Save Payment</button>
</div>

</div>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="card">
<h3>Students</h3>
<h2 id="studentsCount">0</h2>
</div>

<div class="card">
<h3>Total Income</h3>
<h2 id="income">0</h2>
</div>

<div class="card">
<h3>Balance</h3>
<h2 id="balance">0</h2>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
doc,
getDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  storageBucket: "neomis-77b36.firebasestorage.app",
  messagingSenderId: "836047126207",
  appId: "1:836047126207:web:df890a577383585698100a"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.allStudents = [];

/* LOGIN */
window.login = async function(){
const u = username.value;
const p = password.value;

if(u==="admin" && p==="1234"){
loginBox.style.display="none";
app.style.display="block";
await loadStudents();
listenFinance();
}else{
error.innerText="Wrong credentials";
}
};

/* LOAD STUDENTS */
async function loadStudents(){
const snap = await getDocs(collection(db,"students"));

allStudents = [];

studentSelect.innerHTML="";
payStudent.innerHTML="";

snap.forEach(d=>{
const s = d.data();
allStudents.push({id:d.id,...s});

const opt = document.createElement("option");
opt.value = d.id;
opt.textContent = s.name;
studentSelect.appendChild(opt);
});

studentsCount.innerText = allStudents.length;
}

/* FILTER */
window.filterByClass = function(){
const cls = classSelect.value;

studentSelect.innerHTML="";

(allStudents.filter(s=>!cls || s.class===cls))
.forEach(s=>{
const opt=document.createElement("option");
opt.value=s.id;
opt.textContent=s.name;
studentSelect.appendChild(opt);
});
};

/* SHOW PAYMENT */
window.showStudentPayment = function(){
const id = studentSelect.value;
const s = allStudents.find(x=>x.id===id);

if(!s){
paymentBox.innerHTML="No student";
return;
}

const paid = s.paid || 0;
const balance = s.balance || ((s.totalFees||0)-paid);

paymentBox.innerHTML=`
<b>${s.name}</b><br>
Paid: ${paid}<br>
Balance: ${balance}
`;
};

/* LOAD PAY STUDENTS */
window.loadStudentsForPay = function(){
const cls = payClass.value;
payStudent.innerHTML="";

(allStudents.filter(s=>!cls || s.class===cls))
.forEach(s=>{
const opt=document.createElement("option");
opt.value=s.id;
opt.textContent=s.name;
payStudent.appendChild(opt);
});
};

/* SAVE PAYMENT */
window.savePayment = async function(){

const id = payStudent.value;
const amount = Number(amountPaid.value);

if(!id || amount<=0){
alert("Enter valid data");
return;
}

const ref = doc(db,"students",id);
const snap = await getDoc(ref);

if(!snap.exists()) return alert("Student not found");

const s = snap.data();

const newPaid = (s.paid||0)+amount;
const total = s.totalFees||100000;
const newBalance = total - newPaid;

await updateDoc(ref,{
paid:newPaid,
balance:newBalance
});

await addDoc(collection(db,"payments"),{
studentId:id,
name:s.name,
class:s.class,
amount,
date:new Date()
});

alert("Payment saved");

await loadStudents();
};

/* FINANCE LISTENER */
function listenFinance(){
onSnapshot(collection(db,"finance"),snap=>{
let income=0,expenses=0;

snap.forEach(d=>{
income+=d.data().income||0;
expenses+=d.data().expenses||0;
});

incomeEl.innerText=income;
balanceEl.innerText=income-expenses;
});
}

</script>

</body>
</html>
