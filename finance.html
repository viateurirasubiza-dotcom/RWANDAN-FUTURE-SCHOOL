<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050510,#0a1a2f);
color:white;
min-height:100vh;
}

/* LOGIN */
.login-box{
width:320px;
margin:120px auto;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #00ffff55;
}

.login-box h2{
color:#00ffff;
}

.login-box input{
width:90%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

.login-box button{
width:95%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* HEADER */
.header{
background:rgba(0,0,0,0.6);
padding:20px;
text-align:center;
box-shadow:0 0 15px rgba(0,255,255,.4);
}

.header h1{ color:#00ffff; }

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:25px;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
text-align:center;
}

.card h3{ color:#00ffff; }

/* SECTION */
.section{
margin:20px;
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
}

/* BUTTONS */
.btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.report{ background:#ffcc00; }
.print{ background:#25D366; color:white; }

/* HIDE */
.hidden{
display:none;
}

.logout-btn{
position:fixed;
top:15px;
right:15px;
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="login-box">
<h2>💰 Finance Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- 🔴 LOGOUT -->
<button id="logoutBtn" class="logout-btn hidden" onclick="logout()">Logout</button>

<!-- 🔵 SYSTEM -->
<div id="app" class="hidden">

<div class="header">
<h1>💰 Finance Panel</h1>
</div>

<div class="dashboard">

<div class="card"><h3>Students</h3><h2>650</h2></div>
<div class="card"><h3>Fees</h3><h2>50,000,000 RWF</h2></div>
<div class="card"><h3>Expenses</h3><h2>15,000,000 RWF</h2></div>

</div>

<div class="section">
<h2>📊 Reports</h2>

<button class="btn report" onclick="showReport('daily')">Daily</button>
<button class="btn report" onclick="showReport('monthly')">Monthly</button>

<div id="reportBox" style="background:white;color:black;padding:10px;margin-top:10px;border-radius:10px;">
Click report...
</div>
</div>

</div>

<script>
function login(){
let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");
}else{
alert("Wrong login ❌");
}
}

function logout(){
document.getElementById("loginBox").classList.remove("hidden");
document.getElementById("app").classList.add("hidden");
document.getElementById("logoutBtn").classList.add("hidden");
}

function showReport(type){
let box = document.getElementById("reportBox");

if(type==="daily"){
box.innerHTML="Daily income: 500,000 RWF";
}
if(type==="monthly"){
box.innerHTML="Monthly income: 12,000,000 RWF";
}
}
</script>

</body>
</html>
